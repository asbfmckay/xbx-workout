<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FBF6EF">
<title>XBX · Ten Basic Exercises</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF6EF;
    --paper-2:#F5EBE0;
    --blush:#F0E0D2;
    --card:#FFFFFF;
    --ink:#43332E;
    --ink-soft:#9A8273;
    --plum:#A85A3C;
    --plum-deep:#8C4A30;
    --rose:#EAC3AB;
    --rose-soft:#F3E2D5;
    --gold:#CB9A5E;
    --gold-soft:#F2E6CF;
    --line:#EDE0D2;
    --shadow:0 1px 2px rgba(110,70,50,.05), 0 8px 24px rgba(170,110,80,.08);
    --shadow-lg:0 4px 14px rgba(110,70,50,.06), 0 20px 48px rgba(170,110,80,.11);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.5;
    min-height:100vh;
    overflow-x:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(120% 75% at 100% -8%, rgba(228,176,134,.20), transparent 62%),
      radial-gradient(95% 55% at -5% 102%, rgba(224,168,156,.10), transparent 58%);
  }
  .shell{position:relative;z-index:1;max-width:540px;margin:0 auto;padding:0 0 120px;}

  /* ---------- App bar ---------- */
  .appbar{
    position:sticky;top:0;z-index:30;
    background:rgba(255,247,239,.85);
    backdrop-filter:saturate(140%) blur(14px);
    -webkit-backdrop-filter:saturate(140%) blur(14px);
    border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 14px) 20px 12px;
  }
  .greet{display:flex;flex-direction:column;gap:2px;}
  .hello{display:flex;align-items:center;gap:9px;font-family:'Poppins',sans-serif;font-weight:600;font-size:24px;color:var(--ink);line-height:1.1;}
  .hello .sun{width:22px;height:22px;flex:0 0 auto;color:var(--gold);}
  .greet .sub{font-size:12.5px;font-weight:600;color:var(--ink-soft);letter-spacing:.01em;}
  /* ---------- Controls (chart/level pills) ---------- */
  .controls{display:flex;gap:10px;margin-top:14px;}
  .selectwrap{position:relative;flex:1;}
  .selectwrap select{
    width:100%;appearance:none;-webkit-appearance:none;
    font-family:'Inter',sans-serif;font-size:14px;font-weight:700;color:var(--plum);
    background:var(--card);border:1.5px solid var(--line);border-radius:999px;
    padding:11px 34px 11px 16px;cursor:pointer;box-shadow:var(--shadow);
  }
  .selectwrap::after{
    content:"";position:absolute;right:16px;top:15px;width:7px;height:7px;
    border-right:2px solid var(--plum);border-bottom:2px solid var(--plum);
    transform:rotate(45deg);pointer-events:none;
  }
  .selectwrap select:focus-visible{outline:2px solid var(--plum);outline-offset:2px;}

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex;gap:4px;margin:14px 20px 0;padding:4px;
    background:var(--paper-2);border:1px solid var(--line);border-radius:14px;
  }
  .tabs button{
    flex:1;border:0;background:transparent;cursor:pointer;
    font-family:'Inter',sans-serif;font-size:13.5px;font-weight:700;
    letter-spacing:.02em;color:var(--ink-soft);padding:9px 0;border-radius:11px;
    transition:color .2s, background .2s, box-shadow .2s;
  }
  .tabs button[aria-selected="true"]{
    background:var(--card);color:var(--plum);box-shadow:var(--shadow);
  }

  main{padding:0 20px;}

  /* ---------- Hero ---------- */
  .hero{
    margin-top:18px;background:var(--card);border:1px solid var(--line);
    border-radius:24px;box-shadow:var(--shadow-lg);overflow:hidden;
  }
  .hero-top{
    display:flex;align-items:center;gap:18px;padding:22px 22px 18px;
    background:linear-gradient(135deg,#F4E2CE 0%, #EFD6C7 52%, #EBD0CE 100%);
    color:var(--ink);position:relative;
  }
  .ring{flex:0 0 auto;position:relative;width:96px;height:96px;}
  .ring svg{transform:rotate(-90deg);display:block;}
  .ring .num{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }
  .ring .num b{font-family:'Poppins',sans-serif;font-weight:600;font-size:40px;line-height:.9;}
  .ring .num small{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.82;margin-top:3px;}
  .hero-meta{flex:1;min-width:0;}
  .hero-meta .chartname{font-family:'Poppins',sans-serif;font-size:23px;font-weight:600;line-height:1.1;}
  .hero-meta .focus{font-size:13px;font-weight:600;opacity:.85;margin-top:3px;}
  .hero-meta .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;}
  .chip{font-size:11px;font-weight:700;letter-spacing:.04em;padding:5px 10px;border-radius:999px;
    background:rgba(68,66,58,.06);border:1px solid rgba(68,66,58,.13);color:var(--ink-soft);}
  .hero-goal{
    padding:13px 22px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    border-top:1px solid var(--line);background:var(--paper-2);font-size:13px;
  }
  .hero-goal .gtext{flex:1;min-width:140px;color:var(--ink-soft);font-weight:600;}
  .hero-goal .gtext b{color:var(--ink);}
  .agewrap{position:relative;}
  .agewrap select{
    appearance:none;-webkit-appearance:none;font-family:'Inter',sans-serif;
    font-size:13px;font-weight:800;color:var(--ink);background:var(--gold-soft);
    border:1px solid #DACEBF;border-radius:999px;padding:7px 30px 7px 13px;cursor:pointer;
  }
  .agewrap::after{content:"";position:absolute;right:13px;top:13px;width:6px;height:6px;
    border-right:2px solid var(--gold);border-bottom:2px solid var(--gold);transform:rotate(45deg);}

  /* ---------- Section heading ---------- */
  .shead{display:flex;align-items:center;gap:10px;margin:26px 2px 12px;}
  .shead h2{font-family:'Poppins',sans-serif;font-size:19px;font-weight:600;color:var(--ink);}
  .shead .rule{flex:1;height:1px;background:var(--line);}
  .shead .count{font-size:12px;font-weight:800;letter-spacing:.06em;color:var(--ink-soft);}

  /* ---------- Exercise cards ---------- */
  .ex{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    box-shadow:var(--shadow);margin-bottom:11px;overflow:hidden;transition:border-color .2s;
  }
  .ex.done{border-color:var(--rose);background:linear-gradient(180deg,#fff,#f8f8ef);}
  .ex-head{display:flex;align-items:center;gap:13px;padding:14px 15px;cursor:pointer;}
  .ex-no{
    flex:0 0 auto;width:38px;height:38px;border-radius:11px;display:flex;
    align-items:center;justify-content:center;font-family:'Poppins',sans-serif;
    font-weight:600;font-size:17px;color:var(--plum);background:var(--blush);
  }
  .ex.done .ex-no{background:var(--rose);color:var(--ink);}
  .ex-mid{flex:1;min-width:0;}
  .ex-name{font-size:15.5px;font-weight:800;color:var(--ink);line-height:1.2;}
  .ex-sub{font-size:12px;font-weight:600;color:var(--ink-soft);margin-top:2px;}
  .ex-target{flex:0 0 auto;text-align:right;}
  .ex-target b{font-family:'Poppins',sans-serif;font-size:22px;font-weight:600;color:var(--plum);display:block;line-height:1;}
  .ex-target small{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);}
  .ex-body{display:none;padding:0 15px 16px 66px;}
  .ex.open .ex-body{display:block;}
  .ex-fig{display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#fff,var(--paper-2));border:1px solid var(--line);
    border-radius:14px;padding:8px 10px;margin:2px 0 14px;color:var(--plum);}
  .ex-fig svg{width:168px;height:108px;max-width:100%;}
  .ex-fig img{display:block;max-width:100%;height:auto;max-height:134px;}
  .ex-meta{font-size:12px;font-weight:700;letter-spacing:.02em;color:var(--ink-soft);margin:0 0 11px;}
  .ex-body ol{list-style:none;counter-reset:s;margin:4px 0 0;}
  .ex-body ol li{position:relative;padding:0 0 9px 24px;font-size:13.5px;color:var(--ink);counter-increment:s;}
  .ex-body ol li::before{
    content:counter(s);position:absolute;left:0;top:1px;width:16px;height:16px;border-radius:50%;
    background:var(--rose-soft);color:var(--plum);font-size:10px;font-weight:800;
    display:flex;align-items:center;justify-content:center;
  }
  .ex-rec{
    display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:13px;border-top:1px dashed var(--line);
  }
  .ex-rec label{font-size:12px;font-weight:800;letter-spacing:.04em;color:var(--ink-soft);}
  .ex-rec input{
    width:74px;font-family:'Inter',sans-serif;font-size:16px;font-weight:800;color:var(--ink);
    text-align:center;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:8px;
  }
  .ex-rec input:focus-visible{outline:2px solid var(--rose);outline-offset:1px;}
  .ex-rec .tgt{font-size:12px;font-weight:700;color:var(--ink-soft);}
  .ex-rec .done-btn{
    margin-left:auto;border:1px solid var(--line);background:var(--paper);cursor:pointer;
    font-family:'Inter',sans-serif;font-size:12px;font-weight:800;letter-spacing:.04em;
    color:var(--plum);padding:9px 13px;border-radius:11px;display:flex;align-items:center;gap:6px;
  }
  .ex.done .done-btn{background:var(--rose);border-color:var(--rose);color:var(--ink);}
  .ex-rec .done-btn .tick{font-size:13px;}

  /* warm-up grouping note */
  .warmnote{font-size:12px;font-weight:600;color:var(--ink-soft);margin:-2px 4px 12px;}

  /* supplementary toggle */
  .suptoggle{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--paper-2);border:1px dashed var(--line);border-radius:14px;
    padding:12px 15px;margin:6px 0 14px;font-size:13px;font-weight:700;color:var(--ink);
  }
  .switch{position:relative;width:44px;height:26px;flex:0 0 auto;}
  .switch input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer;}
  .switch .track{position:absolute;inset:0;background:var(--line);border-radius:999px;transition:background .2s;}
  .switch .thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;
    box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .2s;}
  .switch input:checked + .track{background:var(--plum);}
  .switch input:checked + .track + .thumb{left:21px;}

  /* ---------- Complete level ---------- */
  /* ---------- Start session button ---------- */
  .startsesh{width:100%;margin-top:16px;border:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
    background:linear-gradient(135deg,#A8563C,#C2734F);color:#fff;padding:15px;border-radius:18px;box-shadow:var(--shadow-lg);
    font-family:'Inter',sans-serif;transition:transform .12s;}
  .startsesh:active{transform:scale(.985);}
  .ss-row{font-size:16px;font-weight:800;letter-spacing:.01em;display:flex;align-items:center;gap:10px;}
  .ss-play{width:0;height:0;border-left:12px solid #fff;border-top:7px solid transparent;border-bottom:7px solid transparent;display:inline-block;}
  .ss-sub{font-size:12px;font-weight:600;opacity:.85;}

  /* ---------- Guided session overlay ---------- */
  .sesh{position:fixed;inset:0;z-index:100;background:var(--paper);display:flex;justify-content:center;}
  .sesh-wrap{width:100%;max-width:540px;height:100%;display:flex;flex-direction:column;
    padding:calc(env(safe-area-inset-top) + 16px) 22px calc(env(safe-area-inset-bottom) + 18px);}
  .sesh-top{display:flex;align-items:center;gap:10px;}
  .sesh-x,.sesh-snd{border:1px solid var(--line);background:var(--card);width:40px;height:40px;border-radius:12px;cursor:pointer;
    color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:15px;flex:0 0 auto;}
  .sesh-exlabel{flex:1;text-align:center;font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);}
  .sesh-barwrap{margin-top:16px;height:7px;background:var(--paper-2);border:1px solid var(--line);border-radius:999px;overflow:hidden;}
  .sesh-bar{height:100%;width:0;background:linear-gradient(90deg,var(--plum),var(--rose));border-radius:999px;transition:width .2s linear;}
  .sesh-time-of{margin-top:8px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);}
  .sesh-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:5px;min-height:0;}
  .sesh-fig{background:linear-gradient(180deg,#fff,var(--paper-2));border:1px solid var(--line);border-radius:18px;
    padding:10px 16px;color:var(--plum);margin-bottom:8px;}
  .sesh-fig img{max-width:100%;max-height:150px;height:auto;display:block;}
  .sesh-name{font-family:'Poppins',sans-serif;font-size:23px;font-weight:600;color:var(--ink);line-height:1.15;}
  .sesh-focus{font-size:13px;font-weight:600;color:var(--ink-soft);}
  .sesh-timer{font-family:'Poppins',sans-serif;font-size:74px;font-weight:600;line-height:1;color:var(--plum);
    margin:12px 0 0;font-variant-numeric:tabular-nums;}
  .sesh-timer.up{color:var(--rose);}
  .sesh-status{font-size:13px;font-weight:800;color:var(--rose);min-height:18px;visibility:hidden;letter-spacing:.02em;}
  .sesh-target{font-size:15px;font-weight:700;color:var(--ink);margin-top:2px;}
  .sesh-target b{font-family:'Poppins',sans-serif;font-size:20px;color:var(--plum);}
  .sesh-ctrls{display:flex;gap:10px;}
  .sesh-btn{flex:1;border:1px solid var(--line);background:var(--card);cursor:pointer;font-family:'Inter',sans-serif;
    font-size:15px;font-weight:800;color:var(--ink);padding:16px 10px;border-radius:16px;transition:transform .12s;}
  .sesh-btn:active{transform:scale(.97);}
  .sesh-btn.next{flex:1.7;background:linear-gradient(135deg,#A8563C,#C2734F);border-color:transparent;color:#fff;}
  .sesh-btn:disabled{opacity:.4;cursor:default;}
  .sesh-btn.next.pulse{animation:seshpulse 1s ease-in-out infinite;}
  @keyframes seshpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  .sesh-done{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;}
  .sesh-done h3{font-family:'Poppins',sans-serif;font-size:25px;font-weight:600;color:var(--ink);}
  .sesh-done p{font-size:14px;color:var(--ink-soft);font-weight:600;max-width:300px;}
  @media (prefers-reduced-motion:reduce){.sesh-btn.next.pulse{animation:none}.sesh-bar{transition:none}}

  .complete{
    width:100%;margin-top:8px;border:0;cursor:pointer;
    font-family:'Inter',sans-serif;font-size:16px;font-weight:800;letter-spacing:.02em;
    color:#fff;background:linear-gradient(135deg,#A8563C,#C2734F);
    padding:17px;border-radius:18px;box-shadow:var(--shadow-lg);
    display:flex;align-items:center;justify-content:center;gap:9px;transition:transform .12s;
  }
  .complete:active{transform:scale(.985);}
  .complete.is-done{background:linear-gradient(135deg,#EBD3BF,#F3E3D2);color:var(--ink);}
  .complete .small{font-size:12px;font-weight:700;opacity:.85;}

  /* ---------- Chart table ---------- */
  .tablecard{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);
    overflow:hidden;margin-top:18px;}
  .tcap{padding:15px 18px 4px;}
  .tcap h2{font-family:'Poppins',sans-serif;font-size:20px;font-weight:600;}
  .tcap p{font-size:12.5px;color:var(--ink-soft);font-weight:600;margin-top:2px;}
  .tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:8px 6px 6px;}
  table{border-collapse:collapse;width:100%;font-size:13px;}
  th,td{padding:9px 6px;text-align:center;white-space:nowrap;}
  thead th{font-size:10px;font-weight:800;letter-spacing:.04em;color:var(--ink-soft);
    text-transform:uppercase;border-bottom:1px solid var(--line);position:sticky;}
  thead th.lvl{text-align:left;padding-left:12px;}
  tbody td{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
  tbody td.lvl{text-align:left;padding-left:12px;font-family:'Poppins',sans-serif;font-size:15px;
    font-weight:600;color:var(--ink);}
  tbody tr{cursor:pointer;border-radius:10px;}
  tbody tr:nth-child(even){background:var(--paper-2);}
  tbody tr.cur{background:var(--plum)!important;}
  tbody tr.cur td{color:#fff!important;}
  tbody tr.cur td.lvl{color:#fff!important;}
  tbody tr.goal td.lvl{box-shadow:inset 3px 0 0 var(--gold);}
  tbody tr.complete td.lvl::after{content:"✓";margin-left:6px;color:var(--plum);font-size:12px;font-family:'Inter';}
  tbody tr.cur.complete td.lvl::after{color:#fff;}
  .tlegend{display:flex;flex-wrap:wrap;gap:14px;padding:12px 18px 16px;border-top:1px solid var(--line);
    font-size:12px;font-weight:700;color:var(--ink-soft);}
  .tlegend span{display:flex;align-items:center;gap:6px;}
  .dot{width:11px;height:11px;border-radius:3px;display:inline-block;}

  /* ---------- Progress ---------- */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:18px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 12px;
    text-align:center;box-shadow:var(--shadow);}
  .stat b{font-family:'Poppins',sans-serif;font-size:30px;font-weight:600;color:var(--plum);display:block;line-height:1;}
  .stat small{font-size:10.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);
    display:block;margin-top:7px;}

  .ladder{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;
    margin-top:14px;box-shadow:var(--shadow);}
  .ladder h3{font-family:'Poppins',sans-serif;font-size:17px;font-weight:600;margin-bottom:4px;}
  .ladder .sub{font-size:12px;color:var(--ink-soft);font-weight:600;margin-bottom:13px;}
  .grid48{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;}
  .cell{aspect-ratio:1;border-radius:7px;background:var(--paper-2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;
    color:var(--ink-soft);cursor:pointer;}
  .cell.done{background:var(--rose);border-color:var(--rose);color:var(--ink);}
  .cell.cur{background:var(--plum);border-color:var(--plum);color:#fff;box-shadow:0 0 0 2px var(--gold);}
  .cell.goal{box-shadow:inset 0 0 0 2px var(--gold);}
  .cell.cur.goal{box-shadow:0 0 0 2px var(--gold);}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;
    margin-top:14px;box-shadow:var(--shadow);}
  .card h3{font-family:'Poppins',sans-serif;font-size:17px;font-weight:600;margin-bottom:4px;}
  .card .sub{font-size:12px;color:var(--ink-soft);font-weight:600;margin-bottom:14px;}
  .mrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
  .mrow .f{display:flex;flex-direction:column;}
  .mrow .f label{font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:4px;}
  .mrow .f input{font-family:'Inter';font-size:15px;font-weight:700;text-align:center;color:var(--ink);
    background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:9px 4px;width:100%;}
  .mrow .f input:focus-visible{outline:2px solid var(--rose);outline-offset:1px;}
  .btn{border:1px solid var(--line);background:var(--paper);cursor:pointer;font-family:'Inter';
    font-size:13px;font-weight:800;color:var(--plum);padding:11px 16px;border-radius:13px;}
  .btn.primary{background:var(--plum);border-color:var(--plum);color:#fff;}
  .btn.full{width:100%;}
  .mlist{margin-top:6px;}
  .mlist .item{display:flex;gap:10px;align-items:baseline;padding:10px 0;border-top:1px solid var(--line);
    font-size:13px;}
  .mlist .item .d{font-weight:800;color:var(--ink);min-width:74px;}
  .mlist .item .v{color:var(--ink-soft);font-weight:600;flex:1;}
  .mlist .item button{margin-left:auto;background:none;border:0;color:var(--ink-soft);cursor:pointer;font-size:16px;}

  .hist .item{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--line);}
  .hist .item:first-child{border-top:0;}
  .hist .badge{flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:var(--blush);color:var(--plum);
    font-family:'Poppins';font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;}
  .hist .h-mid b{font-size:13.5px;font-weight:800;color:var(--ink);}
  .hist .h-mid div{font-size:12px;color:var(--ink-soft);font-weight:600;}
  .empty{text-align:center;color:var(--ink-soft);font-size:13px;font-weight:600;padding:14px 0;}

  .databtns{display:flex;gap:9px;margin-top:14px;}
  .databtns .btn{flex:1;}
  .danger{margin-top:9px;}
  .danger .btn{width:100%;color:#a23a3a;border-color:#eccccc;background:#fbf1f1;}

  .note{font-size:12px;color:var(--ink-soft);font-weight:600;line-height:1.55;margin-top:14px;
    background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:13px 15px;}
  .note b{color:var(--ink);}

  /* toast */
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-size:13.5px;font-weight:700;padding:12px 20px;border-radius:999px;
    box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .foot{text-align:center;font-size:11px;color:var(--ink-soft);font-weight:600;margin-top:28px;line-height:1.6;}

  @media (max-width:380px){
    .ring{width:84px;height:84px;}
    .hero-meta .chartname{font-size:21px;}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important;}
  }
</style>

function withinIdx(lv){ return (lv-1)%12; }
function targetFor(lv,exIdx){ var c=CHARTS[chartIdx(lv)]; return c.reps[exIdx][withinIdx(lv)]; }
function supTargetFor(lv,supIdx){ var c=CHARTS[chartIdx(lv)]; return c.supreps?c.supreps[supIdx][withinIdx(lv)]:null; }
function rec(lv){ if(!state.records[lv]) state.records[lv]={done:false,logged:{},date:null}; return state.records[lv]; }
function goalLevel(){ return state.age!=null ? AGE_GOALS[state.age].level : null; }
function completedCount(){ var n=0; for(var k in state.records){ if(state.records[k].done) n++; } return n; }

function toast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove('show'); },1900);
}
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function fmtDate(iso){ var d=new Date(iso); return d.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'}); }

/* =================== TOP CONTROLS =================== */
function buildControls(){
  var cs=document.getElementById('chartSel');
  cs.innerHTML = CHARTS.map(function(c,i){
    return '<option value="'+i+'">Chart '+c.numeral+' · '+c.theme+'</option>';
  }).join('');
  cs.value = chartIdx(state.level);

  var ls=document.getElementById('levelSel');
  var ci=chartIdx(state.level), opts='';
  for(var j=0;j<12;j++){
    var lv=ci*12+j+1;
    var done = state.records[lv] && state.records[lv].done ? ' ✓' : '';
    opts+='<option value="'+lv+'">Level '+lv+done+'</option>';
  }
  ls.innerHTML=opts;
  ls.value=state.level;
}

/* =================== VIEWS =================== */
function render(){
  buildControls();
  document.querySelectorAll('.tabs button').forEach(function(b){
    b.setAttribute('aria-selected', b.dataset.view===state.view ? 'true':'false');
  });
  var v=document.getElementById('view');
  if(state.view==='today') v.innerHTML=viewToday();
  else if(state.view==='chart') v.innerHTML=viewChart();
  else v.innerHTML=viewProgress();
  window.scrollTo({top:0,behavior:'auto'});
}

function ringSVG(lv){
  var pct=lv/48, r=42, c=2*Math.PI*r, off=c*(1-pct);
  return '<svg width="96" height="96" viewBox="0 0 96 96">'+
    '<circle cx="48" cy="48" r="'+r+'" fill="none" stroke="rgba(62,44,40,.12)" stroke-width="7"/>'+
    '<circle cx="48" cy="48" r="'+r+'" fill="none" stroke="#B0654A" stroke-width="7" stroke-linecap="round" '+
    'stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/></svg>';
}

function viewToday(){
  var lv=state.level, c=CHARTS[chartIdx(lv)], wi=withinIdx(lv);
  var r=rec(lv), goal=goalLevel();
  var html='';

  // hero
  html+='<section class="hero">';
  html+='<div class="hero-top"><div class="ring">'+ringSVG(lv)+
    '<div class="num"><b>'+lv+'</b><small>of 48</small></div></div>';
  html+='<div class="hero-meta"><div class="chartname">'+c.name+'</div>'+
    '<div class="focus">'+c.theme+' · Level '+(wi+1)+' of this chart</div></div></div>';

  // goal row
  var goalTxt;
  if(goal==null){ goalTxt='<span class="gtext">Set your age to see your goal level</span>'; }
  else if(lv>=goal){ goalTxt='<span class="gtext">You\u2019ve reached your goal of <b>Level '+goal+'</b> \u2014 maintain it 3\u00d7 a week</span>'; }
  else { goalTxt='<span class="gtext"><b>'+(goal-lv)+'</b> level'+(goal-lv===1?'':'s')+' to your goal of <b>Level '+goal+'</b></span>'; }
  html+='<div class="hero-goal">'+goalTxt+
    '<div class="agewrap"><select id="ageSel"><option value="">Your age…</option>'+
    AGE_GOALS.map(function(a,i){return '<option value="'+i+'"'+(state.age===i?' selected':'')+'>'+a.label+'</option>';}).join('')+
    '</select></div></div>';
  html+='</section>';

  // primary action, then a clean heading
  html+='<button class="startsesh" id="startSesh"><span class="ss-row"><span class="ss-play"></span>Start 12-minute session</span><span class="ss-sub">Guided timer \u00b7 tap Next to advance</span></button>';
  html+='<div class="shead"><h2>Today\u2019s set</h2><div class="rule"></div></div>';

  // exercises
  for(var i=0;i<10;i++){
    html+=exCard(lv,i,c.ex[i],targetFor(lv,i),false,0);
    // supplementary inserted between 8 and 9 (after exIdx 7) if enabled & available
    if(i===7 && state.showSup && c.sup){
      for(var s=0;s<c.sup.length;s++){
        html+=exCard(lv,s,c.sup[s],supTargetFor(lv,s),true,s);
      }
    }
  }

  // supplementary toggle (only if available)
  if(c.sup){
    html+='<label class="suptoggle">Add supplementary exercises (8A &amp; 8B) \u2014 feet, ankles &amp; posture'+
      '<span class="switch"><input type="checkbox" id="supTog"'+(state.showSup?' checked':'')+'>'+
      '<span class="track"></span><span class="thumb"></span></span></label>';
  } else {
    html+='<p class="warmnote" style="margin-top:14px">Chart IV has no supplementary exercises \u2014 you\u2019re on the full plan.</p>';
  }

  // complete button
  var isDone=r.done;
  html+='<button class="complete '+(isDone?'is-done':'')+'" id="completeBtn">'+
    (isDone
      ? '<span class="tick">\u2713</span> Level '+lv+' done<span class="small"> \u00b7 '+fmtDate(r.date)+'</span>'
      : 'Mark Level '+lv+' complete')+
    '</button>';

  return html;
}

function exCard(lv,i,exObj,target,isSup,supIdx){
  var r=rec(lv);
  var store = isSup ? (r.logged['s'+supIdx]) : (r.logged[i]);
  var doneCls = (store && store.done) ? ' done' : '';
  var openCls = (store && store.open) ? ' open' : '';
  var unit = exObj.unit || 'reps';
  var no = isSup ? (supIdx===0?'8A':'8B') : (i+1);
  var focus = isSup ? (supIdx===0?'Feet & ankles · optional':'Posture · optional') : FOCUS[i];
  var time = isSup ? '\u2014' : mins(i);
  var key = isSup ? ('s'+supIdx) : i;
  var val = (store && store.reps!=null) ? store.reps : '';
  var how = exObj.how.map(function(s){return '<li>'+esc(s)+'</li>';}).join('');

  return '<article class="ex'+doneCls+openCls+'" data-key="'+key+'">'+
    '<div class="ex-head js-toggle">'+
      '<div class="ex-no">'+no+'</div>'+
      '<div class="ex-mid"><div class="ex-name">'+esc(exObj.name)+'</div></div>'+
      '<div class="ex-target"><b>'+target+'</b><small>'+unit+'</small></div>'+
    '</div>'+
    '<div class="ex-body"><div class="ex-fig">'+(isSup?SUPSVG[supIdx]:EXSVG[i])+'</div><div class="ex-meta">'+esc(focus)+' · '+time+'</div><ol>'+how+'</ol>'+
      '<div class="ex-rec">'+
        '<label>Your count</label>'+
        '<input type="number" inputmode="numeric" min="0" class="js-reps" data-key="'+key+'" value="'+val+'" placeholder="\u2013">'+
        '<span class="tgt">/ '+target+' '+unit+'</span>'+
        '<button class="done-btn js-exdone" data-key="'+key+'"><span class="tick">'+((store&&store.done)?'\u2713':'')+'</span>'+((store&&store.done)?'Done':'Mark done')+'</button>'+
      '</div>'+
    '</div></article>';
}

function viewChart(){
  var lv=state.level, ci=chartIdx(lv), c=CHARTS[ci], goal=goalLevel();
  var html='<section class="tablecard"><div class="tcap"><h2>'+c.name+' \u00b7 '+c.theme+'</h2>'+
    '<p>Reps climb as you move up the levels. Tap any row to train it.</p></div>';
  html+='<div class="tscroll"><table><thead><tr><th class="lvl">Lvl</th>';
  for(var e=1;e<=10;e++) html+='<th>'+e+'</th>';
  html+='</tr></thead><tbody>';
  for(var j=11;j>=0;j--){ // show top level first
    var rowLv=ci*12+j+1;
    var cls=[];
    if(rowLv===lv) cls.push('cur');
    if(goal===rowLv) cls.push('goal');
    if(state.records[rowLv] && state.records[rowLv].done) cls.push('complete');
    html+='<tr class="'+cls.join(' ')+'" data-lv="'+rowLv+'"><td class="lvl">'+rowLv+'</td>';
    for(var x=0;x<10;x++) html+='<td>'+c.reps[x][j]+'</td>';
    html+='</tr>';
  }
  html+='</tbody></table></div>';
  html+='<div class="tlegend">'+
    '<span><i class="dot" style="background:var(--plum)"></i>Current</span>'+
    '<span><i class="dot" style="background:var(--rose)"></i>Completed</span>'+
    '<span><i class="dot" style="box-shadow:inset 0 0 0 2px var(--gold);background:transparent"></i>Your goal</span>'+
    '</div></section>';

  html+='<p class="warmnote" style="margin-top:14px">Each level keeps the same exercises and 12-minute limit \u2014 only the counts go up. Move up when you can finish comfortably inside the time.</p>';
  return html;
}

function viewProgress(){
  var done=completedCount(), lv=state.level, goal=goalLevel();
  var pct=Math.round(done/48*100);
  var html='';

  html+='<div class="stats">'+
    '<div class="stat"><b>'+lv+'</b><small>Current level</small></div>'+
    '<div class="stat"><b>'+done+'</b><small>Levels done</small></div>'+
    '<div class="stat"><b>'+pct+'%</b><small>Of all 48</small></div></div>';

  // ladder
  html+='<div class="ladder"><h3>The 48 levels</h3>'+
    '<p class="sub">Four charts \u00b7 twelve levels each. Tap a level to open it.</p><div class="grid48">';
  for(var l=1;l<=48;l++){
    var cls=['cell'];
    if(state.records[l] && state.records[l].done) cls.push('done');
    if(l===lv) cls.push('cur');
    if(goal===l) cls.push('goal');
    html+='<div class="'+cls.join(' ')+'" data-lv="'+l+'">'+l+'</div>';
  }
  html+='</div></div>';

  // measurements
  var m=state.measures;
  html+='<div class="card"><h3>Measurements</h3><p class="sub">A truer guide than the scales \u2014 log it every few weeks.</p>'+
    '<div class="mrow">'+
      '<div class="f"><label>Waist</label><input type="number" inputmode="decimal" id="mWaist" placeholder="cm"></div>'+
      '<div class="f"><label>Hips</label><input type="number" inputmode="decimal" id="mHips" placeholder="cm"></div>'+
      '<div class="f"><label>Bust</label><input type="number" inputmode="decimal" id="mBust" placeholder="cm"></div>'+
      '<div class="f"><label>Weight</label><input type="number" inputmode="decimal" id="mWeight" placeholder="kg"></div>'+
    '</div><button class="btn primary full" id="mSave">Save today\u2019s measurements</button>';
  if(m.length){
    html+='<div class="mlist">';
    for(var mi=m.length-1; mi>=0; mi--){
      var e=m[mi], parts=[];
      if(e.waist) parts.push('W '+e.waist); if(e.hips) parts.push('H '+e.hips);
      if(e.bust) parts.push('B '+e.bust); if(e.weight) parts.push(e.weight+'kg');
      html+='<div class="item"><span class="d">'+fmtDate(e.date)+'</span><span class="v">'+(parts.join(' \u00b7 ')||'\u2014')+'</span>'+
        '<button class="js-mdel" data-i="'+mi+'" aria-label="Delete">\u00d7</button></div>';
    }
    html+='</div>';
  }
  html+='</div>';

  // history
  html+='<div class="card hist"><h3>History</h3><p class="sub">Levels you\u2019ve completed.</p>';
  var hist=[];
  for(var k in state.records){ if(state.records[k].done) hist.push({lv:+k, date:state.records[k].date}); }
  hist.sort(function(a,b){ return new Date(b.date)-new Date(a.date); });
  if(!hist.length){ html+='<p class="empty">No levels logged yet. Finish today\u2019s set and mark it complete.</p>'; }
  else {
    for(var hi=0; hi<hist.length; hi++){
      var c2=CHARTS[chartIdx(hist[hi].lv)];
      html+='<div class="item"><span class="badge">'+hist[hi].lv+'</span><div class="h-mid">'+
        '<b>Level '+hist[hi].lv+' complete</b><div>'+c2.name+' \u00b7 '+fmtDate(hist[hi].date)+'</div></div></div>';
    }
  }
  html+='</div>';

  // data
  html+='<div class="databtns"><button class="btn" id="expBtn">Export backup</button>'+
    '<button class="btn" id="impBtn">Import backup</button></div>'+
    '<input type="file" id="impFile" accept="application/json" style="display:none">'+
    '<div class="danger"><button class="btn" id="resetBtn">Reset all progress</button></div>';

  html+='<div class="note"><b>Saving &amp; devices.</b> Your progress is stored on this device automatically, so it\u2019s here next time you open the app on the same browser. To move it to your phone or another computer, use <b>Export backup</b> here and <b>Import backup</b> there. Want it to sync everywhere on its own? That needs a small cloud step \u2014 easy to add.</div>';

  return html;
}

/* =================== EVENTS =================== */
function setLevel(lv){ state.level=lv; save(); render(); }

document.getElementById('chartSel').addEventListener('change',function(e){
  var ci=+e.target.value; setLevel(ci*12+1);
});
document.getElementById('levelSel').addEventListener('change',function(e){
  setLevel(+e.target.value);
});
document.querySelectorAll('.tabs button').forEach(function(b){
  b.addEventListener('click',function(){ state.view=b.dataset.view; save(); render(); });
});

document.getElementById('view').addEventListener('click',function(e){
  var t=e.target;

  if(t.closest('#startSesh')){ startSession(); return; }

  // age select handled via change below; toggle exercise card
  var head=t.closest('.js-toggle');
  if(head && !t.closest('.ex-rec')){
    var card=head.closest('.ex'); card.classList.toggle('open');
    var lv=state.level, key=card.dataset.key, r=rec(lv);
    var slot = r.logged[key] || (r.logged[key]={});
    slot.open = card.classList.contains('open'); save();
    return;
  }

  // mark single exercise done
  var eb=t.closest('.js-exdone');
  if(eb){
    var lv2=state.level, k2=eb.dataset.key, r2=rec(lv2);
    var slot2 = r2.logged[k2] || (r2.logged[k2]={});
    slot2.done = !slot2.done;
    var card2=eb.closest('.ex'); card2.classList.toggle('done', slot2.done);
    eb.innerHTML='<span class="tick">'+(slot2.done?'\u2713':'')+'</span>'+(slot2.done?'Done':'Mark done');
    save(); return;
  }

  // complete level
  if(t.closest('#completeBtn')){
    var lv3=state.level, r3=rec(lv3);
    r3.done=!r3.done; r3.date = r3.done ? new Date().toISOString() : null;
    save();
    if(r3.done && lv3<48){
      toast('Level '+lv3+' complete \u2728  Moving to '+(lv3+1));
      setTimeout(function(){ setLevel(lv3+1); },650);
    } else { toast(r3.done?'Level '+lv3+' complete \u2728':'Level '+lv3+' reopened'); render(); }
    return;
  }

  // chart row / ladder cell -> jump to level
  var row=t.closest('tr[data-lv]') || t.closest('.cell[data-lv]');
  if(row){ state.view='today'; setLevel(+row.dataset.lv); return; }

  // measurement save
  if(t.closest('#mSave')){
    var w=document.getElementById('mWaist').value, h=document.getElementById('mHips').value,
        b=document.getElementById('mBust').value, kg=document.getElementById('mWeight').value;
    if(!w&&!h&&!b&&!kg){ toast('Add at least one measurement'); return; }
    state.measures.push({date:new Date().toISOString(),waist:w,hips:h,bust:b,weight:kg});
    save(); render(); toast('Measurements saved');
    return;
  }
  var md=t.closest('.js-mdel');
  if(md){ state.measures.splice(+md.dataset.i,1); save(); render(); return; }

  // data buttons
  if(t.closest('#expBtn')){ exportData(); return; }
  if(t.closest('#impBtn')){ document.getElementById('impFile').click(); return; }
  if(t.closest('#resetBtn')){
    if(confirm('Reset all progress, records and measurements? This cannot be undone.')){
      state={ level:1, view:'progress', age:state.age, showSup:false, records:{}, measures:[] };
      save(); render(); toast('Everything reset');
    }
    return;
  }
});

// change events (selects + reps inputs + supplementary toggle)
document.getElementById('view').addEventListener('change',function(e){
  var t=e.target;
  if(t.id==='ageSel'){ state.age = t.value===''? null : +t.value; save(); render(); return; }
  if(t.id==='supTog'){ state.showSup=t.checked; save(); render(); return; }
  if(t.id==='impFile'){ handleImport(t.files[0]); return; }
});
// reps typing (no re-render, keep focus)
document.getElementById('view').addEventListener('input',function(e){
  var t=e.target;
  if(t.classList.contains('js-reps')){
    var lv=state.level, key=t.dataset.key, r=rec(lv);
    var slot = r.logged[key] || (r.logged[key]={});
    slot.reps = t.value===''? null : +t.value;
    save();
  }
});

/* =================== EXPORT / IMPORT =================== */
function exportData(){
  var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob), a=document.createElement('a');
  var d=new Date().toISOString().slice(0,10);
  a.href=url; a.download='xbx-progress-'+d+'.json'; a.click();
  URL.revokeObjectURL(url); toast('Backup downloaded');
}
function handleImport(file){
  if(!file) return;
  var fr=new FileReader();
  fr.onload=function(){
    try{
      var s=JSON.parse(fr.result);
      if(typeof s!=='object'||!('records' in s)) throw 0;
      state={ level:s.level||1, view:'progress', age:('age' in s)?s.age:null,
        showSup:!!s.showSup, records:s.records||{}, measures:s.measures||[] };
      save(); render(); toast('Backup restored');
    }catch(err){ toast('That file didn\u2019t look right'); }
  };
  fr.readAsText(file);
}

/* =================== INIT =================== */
/* ===== Guided 12-minute session (tap to advance) ===== */
var SEG=[30,30,30,30,120,60,60,120,60,180];
function fmtClock(s){ s=Math.max(0,Math.round(s)); var m=Math.floor(s/60),r=s%60; return m+':'+(r<10?'0':'')+r; }
function sndIcon(on){
  var b='<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"/>';
  return b + (on ? '<path d="M16.5 8.5a4 4 0 0 1 0 7"/>' : '<line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/>') + '</svg>';
}
function startSession(){
  var lv=state.level, c=CHARTS[chartIdx(lv)];
  var soundOn = state.sessionSound!==false;
  var idx=0, segStart=Date.now(), paused=false, pauseAt=0, chimed=false, done=false, ac=null;
  function ensureAudio(){ if(!ac){ try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(ac&&ac.state==='suspended'){ try{ac.resume();}catch(e){} } }
  ensureAudio();
  function chime(){
    if(navigator.vibrate){ try{navigator.vibrate([55,40,55]);}catch(e){} }
    if(!soundOn) return; ensureAudio(); if(!ac) return;
    var t=ac.currentTime;
    [784,1175].forEach(function(f,i){
      var o=ac.createOscillator(), g=ac.createGain(); o.type='sine'; o.frequency.value=f;
      o.connect(g); g.connect(ac.destination); var s=t+i*0.16;
      g.gain.setValueAtTime(0.0001,s); g.gain.exponentialRampToValueAtTime(0.16,s+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,s+0.34); o.start(s); o.stop(s+0.36);
    });
  }
  var ov=document.createElement('div'); ov.className='sesh';
  ov.innerHTML='<div class="sesh-wrap">'+
    '<div class="sesh-top">'+
      '<button class="sesh-x" data-act="stop" aria-label="End session">\u2715</button>'+
      '<div class="sesh-exlabel" id="sxLabel"></div>'+
      '<button class="sesh-snd" data-act="sound" aria-label="Toggle cue sound"></button>'+
    '</div>'+
    '<div class="sesh-barwrap"><div class="sesh-bar" id="sxBar"></div></div>'+
    '<div class="sesh-time-of">12-minute plan</div>'+
    '<div class="sesh-body" id="sxBody">'+
      '<div class="sesh-fig" id="sxFig"></div>'+
      '<div class="sesh-name" id="sxName"></div>'+
      '<div class="sesh-focus" id="sxFocus"></div>'+
      '<div class="sesh-timer" id="sxTimer">0:30</div>'+
      '<div class="sesh-status" id="sxStatus"></div>'+
      '<div class="sesh-target" id="sxTarget"></div>'+
    '</div>'+
    '<div class="sesh-ctrls" id="sxCtrls">'+
      '<button class="sesh-btn" data-act="back" id="sxBack">Back</button>'+
      '<button class="sesh-btn pause" data-act="pause" id="sxPause">Pause</button>'+
      '<button class="sesh-btn next" data-act="next" id="sxNext">Next</button>'+
    '</div></div>';
  document.body.appendChild(ov); document.body.style.overflow='hidden';
  var q=function(s){return ov.querySelector(s);};
  var elLabel=q('#sxLabel'), elBar=q('#sxBar'), elFig=q('#sxFig'), elName=q('#sxName'),
      elFocus=q('#sxFocus'), elTimer=q('#sxTimer'), elStatus=q('#sxStatus'), elTarget=q('#sxTarget'),
      elBack=q('#sxBack'), elPause=q('#sxPause'), elNext=q('#sxNext'), elSnd=q('.sesh-snd'),
      elBody=q('#sxBody'), elCtrls=q('#sxCtrls');
  elSnd.innerHTML=sndIcon(soundOn);
  function planBefore(i){ var s=0; for(var k=0;k<i;k++) s+=SEG[k]; return s; }
  function segElapsed(){ return ((paused?pauseAt:Date.now())-segStart)/1000; }
  function tick(){
    if(done) return;
    var e=segElapsed(), rem=SEG[idx]-e;
    if(rem<=0){
      elTimer.textContent='0:00'; elTimer.classList.add('up');
      elStatus.textContent='Time\u2019s up \u00b7 '+fmtClock(-rem)+' over'; elStatus.style.visibility='visible';
      elNext.classList.add('pulse');
      if(!chimed){ chimed=true; chime(); }
    } else {
      elTimer.textContent=fmtClock(rem); elTimer.classList.remove('up');
      elStatus.style.visibility='hidden'; elNext.classList.remove('pulse');
    }
    elBar.style.width=((planBefore(idx)+Math.min(e,SEG[idx]))/720*100).toFixed(2)+'%';
  }
  function setExercise(i){
    idx=i; segStart=Date.now(); paused=false; chimed=false; elPause.textContent='Pause';
    var ex=c.ex[i], tgt=targetFor(lv,i), unit=(i===9)?'steps':'reps';
    elFig.innerHTML=EXSVG[i];
    elName.textContent=(i+1)+'. '+ex.name;
    elFocus.textContent=FOCUS[i]+' \u00b7 '+mins(i)+' window';
    elTarget.innerHTML='Aim for <b>'+tgt+'</b> '+unit;
    elLabel.textContent='Exercise '+(i+1)+' of 10';
    elNext.textContent=(i===9)?'Finish':'Next';
    elBack.disabled=(i===0);
    elTimer.classList.remove('up'); elNext.classList.remove('pulse'); elStatus.style.visibility='hidden';
    tick();
  }
  var iv=setInterval(tick,200);
  function close(){ clearInterval(iv); if(ov.parentNode) ov.parentNode.removeChild(ov); document.body.style.overflow=''; }
  function finish(){
    done=true; clearInterval(iv); elBar.style.width='100%';
    elBody.innerHTML='<div class="sesh-done"><div class="sesh-fig">'+EXSVG[9]+'</div>'+
      '<h3>That\u2019s your 12 minutes</h3><p>Level '+lv+' \u00b7 '+c.name+'. Log it if you finished comfortably inside the time.</p></div>';
    elLabel.textContent='Complete';
    elCtrls.innerHTML='<button class="sesh-btn" data-act="closeonly">Close</button>'+
      '<button class="sesh-btn next" data-act="logdone">Mark level complete</button>';
  }
  function logComplete(){
    var r=rec(lv); r.done=true; r.date=new Date().toISOString();
    if(lv<48){ state.level=lv+1; } state.view='today'; save(); close(); render();
    toast('Level '+lv+' complete \u2728');
  }
  ov.addEventListener('click',function(e){
    var b=e.target.closest('[data-act]'); if(!b) return;
    var act=b.dataset.act;
    if(act==='stop'||act==='closeonly'){ close(); return; }
    if(act==='logdone'){ logComplete(); return; }
    if(act==='sound'){ soundOn=!soundOn; state.sessionSound=soundOn; save(); elSnd.innerHTML=sndIcon(soundOn); if(soundOn) ensureAudio(); return; }
    if(act==='pause'){
      if(!paused){ paused=true; pauseAt=Date.now(); elPause.textContent='Resume'; }
      else { segStart+=(Date.now()-pauseAt); paused=false; elPause.textContent='Pause'; }
      return;
    }
    if(act==='back'){ if(idx>0) setExercise(idx-1); return; }
    if(act==='next'){ if(idx<9) setExercise(idx+1); else finish(); return; }
  });
  setExercise(0);
}

load();
(function(){var h=new Date().getHours(),g=document.getElementById('greet');if(g)g.textContent=h<12?'Good morning':h<18?'Good afternoon':'Good evening';})();
render();
</script>
</body>
</html>
